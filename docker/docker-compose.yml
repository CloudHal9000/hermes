services:
    api-server:
        image: ghcr.io/open-rmf/rmf-web/api-server:jazzy-nightly
        network_mode: host
        environment:
            - ROS_DOMAIN_ID=0
            - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
            - RMF_API_SERVER_CONFIG=/rmf_api_server_config.py
        volumes:
            - ./api-server-config.py:/rmf_api_server_config.py
        restart: unless-stopped

    mock-adapter:
        build:
            context: ./mock-adapter
            dockerfile: Dockerfile
        network_mode: host
        environment:
            - ROS_DOMAIN_ID=0
            - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
        depends_on:
            - api-server
        restart: unless-stopped
