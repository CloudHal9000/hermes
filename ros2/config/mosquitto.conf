# mosquitto.conf — MQTT Broker for VDA5050 robots
# Used by vda5050_connector to bridge ROS 2 ↔ VDA5050 protocol
#
# VDA5050 spec: https://github.com/VDA5050/VDA5050
# Default port: 1883 (unencrypted for LAN deployments)

# Listener — bind to all interfaces
listener 1883
allow_anonymous true

# Logging — production: errors + warnings only
log_type error
log_type warning
log_dest file /tmp/hermes_mqtt/mosquitto.log
log_dest stderr

# Persistence — survives broker restart + helps robots reconnect
persistence true
persistence_location /tmp/hermes_mqtt/

# Max simultaneous connections (1 robot + management tools)
max_connections 50

# Message buffer — keep undelivered messages for ~1 minute
message_size_limit 0
max_queued_messages 1000
